               - Residence à l'Hotel Pasteur -
 
" Dessine-moi un escargot.
L’atelier Ludd, c’est : récupérer, ouvrir, comprendre, transformer, bidouiller, créer.

Lors de notre séjour à l’Hôtel Pasteur, nous vous invitons à un atelier de création de machines à dessiner, conçues à partir de vos objets du quotidien qui ne vous servent plus ou qui ne fonctionnent plus, ainsi que de machines électroniques obsolètes. Apportez-les avec vous ! Ensemble, nous vous aiderons à les ouvrir, les démonter, les transformer et les « luddifier », pour expérimenter graphiquement et collectivement. L’atelier donnera lieu à la réalisation d’un fanzine personnalisé, que chacun·e pourra compléter.

Un atelier Ludd, c’est ? 
- Des objets anciens oubliés dans vos tiroirs, re-fonctionnalisés et prêts pour une seconde vie !
- Des machines détournées pour créer autrement.
- Expérimenter graphiquement et plastiquement
- Un fanzine personnalisé pour documenter et partager les expérimentations 
- Une invitation à oser "
			
			</textarea>

                - Atelier D13 - 

Notre atelier, situé en salle D13, est resté ouvert durant toute la phase de développement du projet.
Il est ainsi devenu un lieu de passage, d’échange et de création collective.

Merci à nos ami·es de DSAA 2e année Design et création en environnement Numérique, aux étudiant·es de DSAA 2e année Design Typographique — Écriture & Sociétés, à Képa et à Marion. Ces temps d’atelier ont autant été l’occasion de les accompagner dans leurs projets que de nourrir notre propre projet et notre recherche, en recueillant leurs premières impressions sur notre travail.

			</textarea>

				- 104 - 

Résidence de 4 jours au Cent Quatre - Paris autour du démontage, du détournement et de la réinvention d’objets récupérés. Ce premier espace de création a été l’occasion de développer des outils et des machines pour créer des traces graphiques. 
                
Imprimante à jet d’encre recueillie dans la rue, Imprimante 3D trouvée dans le fond d’un placard et couteau électrique secouru deviennent des nouvelles façons d’entrevoir la création graphique.
			
			</textarea>
