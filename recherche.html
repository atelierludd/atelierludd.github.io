<script>
    /* MACHINE A ECRIRE scroll-scrubbing */
    var typewriterBlocks = document.querySelectorAll(".typewriter-block");

    function updateTypewriters() {
        var wh = window.innerHeight;
        typewriterBlocks.forEach(function(block) {
            var el = block.querySelector(".typewriter-text");
            var text = block.dataset.text;
            var rect = block.getBoundingClientRect();
            var progress = (wh - rect.top) / wh;
            var chars = Math.max(0, Math.min(text.length, Math.round(progress * text.length)));
            el.textContent = text.slice(0, chars);
            el.classList.toggle("done", chars >= text.length);
        });
    }

    window.addEventListener("scroll", updateTypewriters, { passive: true });
    updateTypewriters();

    /* ── SLIDERS ─────────────────────────────────────────── */
    document.querySelectorAll('.slider-box').forEach(box => {
        const track = box.querySelector('.slider-track');
        const imgs = track.querySelectorAll('.slider-img');
        const dotsContainer = box.querySelector('.slider-dots');
        let current = 0;

        imgs.forEach((_, i) => {
            const d = document.createElement('span');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            d.addEventListener('click', () => goTo(i));
            dotsContainer.appendChild(d);
        });

        function goTo(n) {
            current = (n + imgs.length) % imgs.length;
            track.style.transform = `translateX(-${current * 100}%)`;
            dotsContainer.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        box.querySelector('.slider-prev').addEventListener('click', () => goTo(current - 1));
        box.querySelector('.slider-next').addEventListener('click', () => goTo(current + 1));

        let startX = 0;
        track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        track.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - startX;
            if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
        });
    });
</script>
