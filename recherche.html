                </div>
                <button class="slider-btn slider-prev" aria-label="précédent">]</button>
                <button class="slider-btn slider-next" aria-label="suivant">]</button>

                        <img src="IMG/SVG/2recherche.webp" class="svg-default" loading="lazy">
                        <img src="IMG/SVG/2recherche-hover.webp" class="svg-hover" loading="lazy">
                    </a>
                </div>

            </div>
        </div>

    </main>

<script>
    const track = document.querySelector('.slider-track');
    const imgs = track.querySelectorAll('.slider-img');
    const dotsContainer = document.getElementById('sliderDots');
    let current = 0;

    imgs.forEach((_, i) => {
        const d = document.createElement('span');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(d);
    });

    function goTo(n) {
        current = (n + imgs.length) % imgs.length;
        track.style.transform = `translateX(-${current * 100}%)`;
        dotsContainer.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    document.querySelector('.slider-prev').addEventListener('click', () => goTo(current - 1));
    document.querySelector('.slider-next').addEventListener('click', () => goTo(current + 1));

    let startX = 0;
    track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
    track.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    });
</script>
</body>
